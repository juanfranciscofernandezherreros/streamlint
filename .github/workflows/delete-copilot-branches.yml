name: Delete Copilot Branches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-copilot-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all branches starting with 'copilot'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.default_branch;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            let deleted = 0;
            let skipped = [];

            for (const branch of branches) {
              if (!branch.name.startsWith('copilot')) continue;

              if (branch.name === defaultBranch || branch.protected) {
                core.warning(`⚠️ Skipping protected/default branch: ${branch.name}`);
                skipped.push(branch.name);
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
                core.info(`✅ Deleted branch: ${branch.name}`);
                deleted++;
              } catch (error) {
                core.warning(`⚠️ Could not delete branch: ${branch.name} — ${error.message}`);
                skipped.push(branch.name);
              }
            }

            core.info(`\n🏁 Done. Deleted ${deleted} branch(es).`);
            if (skipped.length > 0) {
              core.warning(`Skipped ${skipped.length} branch(es): ${skipped.join(', ')}`);
            }
